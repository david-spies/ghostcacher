<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-mono);font-size:13px}
.wrap{padding:1.5rem 0 1rem}

.tree-root{line-height:1}
.tree-line{display:flex;align-items:stretch;min-height:28px;cursor:default}
.tree-line:hover .row-inner{background:var(--color-background-secondary)}
.row-inner{display:flex;align-items:center;gap:8px;padding:3px 8px 3px 0;border-radius:6px;flex:1;transition:background .1s}

.indent{display:flex;align-items:stretch;flex-shrink:0}
.pipe{width:20px;display:flex;justify-content:center;position:relative}
.pipe::before{content:'';position:absolute;top:0;bottom:0;left:50%;width:1px;background:var(--color-border-tertiary)}
.pipe.last::before{bottom:50%}
.pipe.gap{opacity:0}
.elbow{width:20px;position:relative;flex-shrink:0}
.elbow::before{content:'';position:absolute;top:50%;left:50%;width:10px;height:1px;background:var(--color-border-tertiary)}
.elbow::after{content:'';position:absolute;top:0;bottom:50%;left:50%;width:1px;background:var(--color-border-tertiary)}

.icon{width:16px;height:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.icon svg{width:14px;height:14px}

.name{color:var(--color-text-primary);font-weight:400;white-space:nowrap}
.name.dir{font-weight:500}
.name.root-name{font-size:14px;font-weight:500}

.badge{font-size:10px;padding:1px 6px;border-radius:3px;white-space:nowrap;border:0.5px solid;margin-left:4px}
.b-rust  {background:var(--color-background-primary);border-color:var(--color-border-secondary);color:var(--color-text-secondary)}
.b-cfg   {background:var(--color-background-primary);border-color:var(--color-border-secondary);color:var(--color-text-secondary)}
.b-yaml  {background:var(--color-background-primary);border-color:var(--color-border-secondary);color:var(--color-text-secondary)}
.b-py    {background:var(--color-background-primary);border-color:var(--color-border-secondary);color:var(--color-text-secondary)}
.b-doc   {background:var(--color-background-primary);border-color:var(--color-border-secondary);color:var(--color-text-secondary)}
.b-json  {background:var(--color-background-primary);border-color:var(--color-border-secondary);color:var(--color-text-secondary)}
.b-svg   {background:var(--color-background-primary);border-color:var(--color-border-secondary);color:var(--color-text-secondary)}
.b-docker{background:var(--color-background-primary);border-color:var(--color-border-secondary);color:var(--color-text-secondary)}
.b-sh    {background:var(--color-background-primary);border-color:var(--color-border-secondary);color:var(--color-text-secondary)}

.loc{margin-left:auto;font-size:11px;color:var(--color-text-tertiary);padding-right:4px;white-space:nowrap}

.desc{font-size:11px;color:var(--color-text-tertiary);margin-left:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.summary-strip{display:flex;gap:20px;flex-wrap:wrap;padding:14px 8px 0;border-top:0.5px solid var(--color-border-tertiary);margin-top:12px}
.stat{display:flex;flex-direction:column;gap:2px}
.stat-val{font-size:18px;font-weight:500;color:var(--color-text-primary);line-height:1}
.stat-lbl{font-size:11px;color:var(--color-text-tertiary)}

.legend{display:flex;gap:14px;flex-wrap:wrap;padding:10px 8px 0;font-size:11px;color:var(--color-text-tertiary)}
.leg-item{display:flex;align-items:center;gap:5px}
.leg-dot{width:8px;height:8px;border-radius:2px}
</style>

function buildTree(){
  const el = document.getElementById('tree');
  const stacks = {};

  tree.forEach((node, idx) => {
    const d = node.depth;
    const parentPipes = [];
    for(let i=1;i<d;i++){
      const open = stacks[i] === false ? false : true;
      parentPipes.push(open);
    }

    stacks[d] = !node.last;
    if(node.last) stacks[d] = false;

    const line = document.createElement('div');
    line.className = 'tree-line';

    let indentHTML = '';
    for(let i=1;i<d;i++){
      const continuing = stacks[i] !== false;
      indentHTML += `<div class="pipe${continuing||i<d-1?'':' last'}"></div>`;
    }
    if(d > 0){
      indentHTML += `<div class="elbow"></div>`;
    }

    const isDir = node.t === 'dir';
    const iconHTML = icon(node.t);
    const nameClass = isDir ? 'name dir' : (d===0 ? 'name root-name' : 'name');
    const locHTML = node.loc ? `<span class="loc">${node.loc} loc</span>` : '';
    const descHTML = node.desc ? `<span class="desc">${node.desc}</span>` : '';

    line.innerHTML = `
      <div class="indent" style="width:${Math.max(0,d)*20}px">${indentHTML}</div>
      <div class="row-inner">
        ${iconHTML}
        <span class="${nameClass}">${node.n}</span>
        ${descHTML}
        ${locHTML}
      </div>`;

    el.appendChild(line);
  });
}

buildTree();
