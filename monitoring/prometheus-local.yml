global:
  scrape_interval:     10s
  evaluation_interval: 10s
  external_labels:
    environment: local-dev
    app: ghostcacher

scrape_configs:
  - job_name: 'ghostcacher-sidecar'
    static_configs:
      - targets: ['gc-sidecar:9090']     # ← use container_name, not service name
    metrics_path: /metrics
    scrape_interval: 5s

  - job_name: 'ghostcacher-control-plane'
    static_configs:
      - targets: ['gc-control-plane:7070']  # ← use container_name, not service name
    metrics_path: /metrics
