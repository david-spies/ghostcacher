# redis/redis.conf — GhostCacher local development Redis configuration

bind 0.0.0.0
protected-mode no
port 6379
tcp-keepalive 300

# Persistence
appendonly yes
appendfsync everysec
save 900 1
save 300 10
save 60 10000
dir /data
dbfilename dump.rdb

# Memory
maxmemory 2gb
maxmemory-policy allkeys-lru
maxmemory-samples 10

# Keyspace notifications for TTL expiry events (eviction engine)
notify-keyspace-events "Ex"

# Performance
hz 20
dynamic-hz yes
slowlog-log-slower-than 10000
slowlog-max-len 128

loglevel notice
