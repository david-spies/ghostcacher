---
# k8s/00-namespace.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: ghostcacher
  labels:
    app.kubernetes.io/name: ghostcacher
    app.kubernetes.io/version: "2.1.0"

---
# ServiceAccount for the control plane (needs pod list/watch for auto-discovery)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ghostcacher-control-plane
  namespace: ghostcacher

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ghostcacher-control-plane
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ghostcacher-control-plane
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ghostcacher-control-plane
subjects:
  - kind: ServiceAccount
    name: ghostcacher-control-plane
    namespace: ghostcacher
